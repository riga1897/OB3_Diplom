# ============================================
# OB3 Document Processing Service
# Staging Docker Compose (5 контейнеров)
# ============================================
name: ob3
# Архитектура зависимостей:
#   postgres ──┐
#              ├─→ web (миграции + collectstatic) ─┬─→ nginx
#   redis ─────┘                                   ├─→ celery_worker
#                                                  └─→ celery_beat
#
# Запуск: docker compose up -d
# Остановка: docker compose down
# Логи: docker compose logs -f
# Тесты: docker compose exec web pytest
# Пересборка: docker compose build --no-cache

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: ob3_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-ob3_documents}
      POSTGRES_USER: ${DB_USER:-ob3_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ob3_password}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ob3_user} -d ${DB_NAME:-ob3_documents}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ob3_network
    restart: unless-stopped

  # ============================================
  # Redis (Celery broker, cache)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: ob3_redis
    env_file:
      - .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ob3_network
    restart: unless-stopped

  # ============================================
  # Django + Gunicorn (Web Application)
  # Выполняет миграции и collectstatic
  # Тесты: docker compose exec web pytest
  # ============================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: web
    container_name: ob3_web
    command: web
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/var/media
      - ./var/logs:/app/var/logs
      - ./var/coverage:/app/var/coverage
      - ./tests:/app/tests
      - ./fixtures:/app/fixtures
      - /app/.venv
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.staging
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
      - CACHE_BACKEND=redis
      - CELERY_TASK_ALWAYS_EAGER=False
      - DB_HOST=postgres
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ob3_network
    restart: unless-stopped
    expose:
      - "8000"

  # ============================================
  # Celery Worker (асинхронные задачи)
  # Ждёт готовности web (миграции применены)
  # ============================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: celery
    container_name: ob3_celery_worker
    command: worker
    volumes:
      - media_files:/app/var/media
      - ./var/logs:/app/var/logs
      - /app/.venv
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.staging
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
      - CACHE_BACKEND=redis
      - CELERY_TASK_ALWAYS_EAGER=False
      - DB_HOST=postgres
      - PYTHONPATH=/app
    depends_on:
      web:
        condition: service_healthy
    networks:
      - ob3_network
    restart: unless-stopped

  # ============================================
  # Celery Beat (периодические задачи)
  # Ждёт готовности web (миграции применены)
  # ============================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: celery
    container_name: ob3_celery_beat
    command: beat
    volumes:
      - ./var/logs:/app/var/logs
      - /app/.venv
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.staging
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
      - CACHE_BACKEND=redis
      - CELERY_TASK_ALWAYS_EAGER=False
      - DB_HOST=postgres
      - PYTHONPATH=/app
    depends_on:
      web:
        condition: service_healthy
    networks:
      - ob3_network
    restart: unless-stopped

  # ============================================
  # Nginx (Reverse Proxy)
  # Ждёт готовности web
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: ob3_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
    ports:
      - "80:80"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - ob3_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  ob3_network:
    driver: bridge
