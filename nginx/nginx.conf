# ============================================
# OB3 Document Processing Service
# Nginx Configuration (Staging)
# ============================================
# Архитектура: Nginx (80) → Reverse Proxy → Gunicorn (8000)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Формат логов с метриками upstream
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Оптимизация производительности
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # Максимальный размер загружаемых файлов (соответствует MAX_UPLOAD_SIZE в Django)
    client_max_body_size 10M;

    # Upstream для Gunicorn (Django)
    upstream django_backend {
        server web:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        charset utf-8;

        # Заголовки безопасности
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Таймауты для обработки больших файлов
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Статические файлы Django (collectstatic)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        # Медиа файлы (загруженные документы) — проксируем через Django для проверки прав
        location /media/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "private, no-store, no-cache, must-revalidate";
        }

        # Health check endpoint (для Docker/Kubernetes)
        location /health/ {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # API и админка → Django/Gunicorn
        location / {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Буферизация для эффективной передачи
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 24k;
        }

        # Запрет доступа к скрытым файлам (.git, .env)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Запрет прямого доступа к Python файлам
        location ~* \.py$ {
            deny all;
        }
    }
}
